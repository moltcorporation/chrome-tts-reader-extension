<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>TTS Reader</title>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>TTS Reader</h1>
      <span id="proBadge" class="pro-badge hidden">PRO</span>
    </div>

    <div class="controls">
      <button id="playBtn" class="btn btn-play">&#9654; Play</button>
      <button id="pauseBtn" class="btn btn-pause" disabled>&#9208; Pause</button>
      <button id="stopBtn" class="btn btn-stop" disabled>&#9209; Stop</button>
    </div>

    <div class="settings">
      <div class="setting-group">
        <label for="voiceSelect">Voice:</label>
        <select id="voiceSelect">
          <option value="">Default</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="speedSlider">Speed: <span id="speedValue">1.0x</span></label>
        <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1">
      </div>
    </div>

    <!-- Pro Features Section -->
    <div id="proFeatures" class="pro-features hidden">
      <div class="setting-group">
        <label>Reading Queue:</label>
        <div id="queueList" class="queue-list">
          <span class="queue-empty">No pages queued</span>
        </div>
        <button id="addToQueueBtn" class="btn btn-small">+ Add current page</button>
      </div>

      <div class="setting-group">
        <label>Saved Position:</label>
        <div id="savedPosition" class="saved-position">
          <span class="queue-empty">No saved position</span>
        </div>
        <div class="position-buttons">
          <button id="savePositionBtn" class="btn btn-small">Save</button>
          <button id="resumePositionBtn" class="btn btn-small" disabled>Resume</button>
        </div>
      </div>

      <div class="setting-group">
        <label>
          <input type="checkbox" id="autoSkipNav" checked> Auto-skip navigation
        </label>
      </div>

      <button id="viewStatsBtn" class="btn btn-small btn-stats">View Reading Stats</button>
    </div>

    <!-- Stats Modal -->
    <div id="statsModal" class="stats-modal hidden">
      <div class="stats-header">
        <h2>Reading Stats</h2>
        <button id="closeStatsBtn" class="btn-close">&times;</button>
      </div>
      <div id="statsContent" class="stats-content">
        <p>Loading...</p>
      </div>
    </div>

    <!-- Upgrade Banner (shown to free users) -->
    <div id="upgradeBanner" class="upgrade-banner">
      <p class="upgrade-text">Unlock Pro features for $2/mo</p>
      <ul class="upgrade-features">
        <li>Reading queue</li>
        <li>Save &amp; resume position</li>
        <li>Auto-skip navigation</li>
        <li>Reading stats dashboard</li>
      </ul>
      <button id="upgradeBtn" class="btn btn-upgrade">Upgrade to Pro</button>
    </div>

    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
