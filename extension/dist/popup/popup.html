<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>TTS Reader</title>
</head>
<body>
  <div id="app">
    <h1>TTS Reader</h1>

    <div class="controls">
      <button id="playBtn" class="btn btn-play">▶ Play</button>
      <button id="pauseBtn" class="btn btn-pause" disabled>⏸ Pause</button>
      <button id="stopBtn" class="btn btn-stop" disabled>⏹ Stop</button>
    </div>

    <div class="settings">
      <div class="setting-group">
        <label for="voiceSelect">Voice:</label>
        <select id="voiceSelect">
          <option value="">Default</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="speedSlider">Speed: <span id="speedValue">1.0x</span></label>
        <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1">
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
